name: nyc_taxi
version: "1.0.0"
config-version: 2

profile: nyc_taxi

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  start_date: "2023-01-01"

models:
  nyc_taxi:
    staging:
      +schema: STAGING
      +materialized: view          # staging is cheap — keep as views
      +tags: ["staging"]
    intermediate:
      +schema: INTERMEDIATE
      +materialized: incremental   # intermediate grows over time
      +tags: ["intermediate"]
    marts:
      +schema: MARTS
      +materialized: table         # marts are queried heavily — full tables
      +tags: ["marts"]
      +post-hook:
        - "GRANT SELECT ON {{ this }} TO ROLE ANALYST"
