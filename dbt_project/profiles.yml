nyc_taxi:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: TRANSFORMER
      database: NYC_TAXI
      warehouse: COMPUTE_WH
      schema: STAGING
      threads: 4
      client_session_keep_alive: False
      query_tag: dbt-dev

    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: TRANSFORMER
      database: NYC_TAXI
      warehouse: COMPUTE_WH
      schema: STAGING
      threads: 8
      client_session_keep_alive: False
      query_tag: dbt-prod
