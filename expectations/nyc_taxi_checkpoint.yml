name: nyc_taxi_checkpoint
config_version: 1.0
class_name: SimpleCheckpoint
run_name_template: "%Y%m%d-%H%M%S-nyc-taxi"

validations:
  - batch_request:
      datasource_name: snowflake_datasource
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: NYC_TAXI.STAGING.STG_YELLOW_TRIPS
    expectation_suite_name: nyc_taxi.staging.warning

  - batch_request:
      datasource_name: snowflake_datasource
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: NYC_TAXI.MARTS.MART_DAILY_TRIP_SUMMARY
    expectation_suite_name: nyc_taxi.marts.critical

action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction

  - name: store_evaluation_params
    action:
      class_name: StoreEvaluationParametersAction

  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
      site_names:
        - local_site
